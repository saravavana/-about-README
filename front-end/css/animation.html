<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <div class="container">
        <div id="one"></div>
        <div id="two"></div>
        </div>
        <style>
            .container{
                display: flex;
                justify-content: space-between;
            }
            #one{
                width: 400px;
                height: 500px;
                background-color: red;
            }
            #two{
                 width: 400px;
                height: 500px;
                background-color:red;
            }
            #one:hover{
                width: 500px;
                transition-timing-function:linear;
                background-color: black;
                transition: 5s;
                animation-name: content;
            }
            #two:hover{
                width: 500px;
                transition-timing-function:linear;
                background-color: black;
                transition: 5s;
                animation-name: content;
            }
            @keyframes content{
                from{
                     width: 500px;
                transition-timing-function:linear;
                background-color: black;
                animation: 5s;
                }
            }
        </style>
    </body>
</html>
