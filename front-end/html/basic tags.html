<!DOCTYPE html>
<html>
<head>
<title>HTML BASIC TAGS</title>
</head>
<body>

<h2><b>This is bold text.</b></h2>
<h2><strong>This is strongly important text.</strong></h2>
<h2><i>This is italic text.</i></h2>
<h2><em>This is emphasized text.</em></h2>
<h2>This is <mark>highlighted text.</mark></h2>
<h2>This is <small>smaller text.</small></h2>
<h2>This is <sub>subscript</sub> and <sup>superscript</sup> text.</h2>
<h2>This is <del>deleted text.</del></h2>
<h2>This is <ins>inserted text.</ins></h2>

</body>
</html>
